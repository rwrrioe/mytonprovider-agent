system:
  agent_id: auto
  adnl_port: "16167"
  log_level: 1
  min_job_idle: 15m
  reaper_timeout: 10m

redis:
  addr: redis:6379
  group: mtpa
  stream_prefix: mtpa
  result_maxlen: 100000

ton:
  config_url: https://ton-blockchain.github.io/global.config.json

workers:
  discovery:
    enabled: true
    pool: 1
    timeout: 30m
    block_ms: 5000
    concurrency: 16
    endpoint_ttl: 30m

  poll:
    enabled: true
    pool: 1
    timeout: 10m
    block_ms: 5000
    concurrency: 30

  proof:
    enabled: true
    pool: 1
    timeout: 60m
    block_ms: 5000
    concurrency: 30
    endpoint_ttl: 1h

  update:
    enabled: true
    pool: 1
    timeout: 60m
    block_ms: 5000

metrics:
  enabled: true
  port: "2112"
