# Агент — отдельный stack, симулирующий «другую машину».
# Подключён только к external bridge_net (mtpa_bridge), где живёт redis бэкенда.
# Postgres агент не видит. App бэкенда тоже.
services:
  agent:
    build: .
    container_name: mtpa_agent
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/config/config.yaml
    ports:
      - "2112:2112"           # /metrics на хост
      - "16167:16167/udp"     # ADNL
    volumes:
      - ./config:/app/config:ro
    networks:
      - bridge_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    ports:
      - "9091:9090"
    depends_on:
      - agent
networks:
  bridge_net:
    external: true
    name: mtpa_bridge
