# Агент — отдельный stack, симулирующий «другую машину».
# Подключён только к external bridge_net (mtpa_bridge), где живёт redis бэкенда.
# Postgres агент не видит. App бэкенда тоже.
services:
  agent:
    build: .
    container_name: mtpa_agent
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/config/config.yaml
    ports:
      - "2112:2112"           # /metrics на хост
      - "16167:16167/udp"     # ADNL
    volumes:
      - ./config:/app/config:ro
    networks:
      - bridge_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - agent
    networks:
      - bridge_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
    depends_on:
      - jaeger
    networks:
      - bridge_net

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    networks:
      - bridge_net

networks:
  bridge_net:
    external: true
    name: mtpa_bridge
